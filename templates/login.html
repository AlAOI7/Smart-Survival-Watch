<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول | NajatWatch</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#FAF7F2;color:#1A1A1A;min-height:100vh;direction:rtl;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(139,90,43,0.05) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(44,44,44,0.03) 0%,transparent 50%);pointer-events:none}
.auth-card{background:#ffffff;border:1px solid #E8E3DB;border-radius:24px;padding:48px 40px;width:100%;max-width:440px;position:relative;box-shadow:0 20px 40px rgba(0,0,0,0.05)}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,#8B5A2B,transparent);border-radius:24px 24px 0 0}
.auth-brand{text-align:center;margin-bottom:36px}
.auth-logo{width:68px;height:68px;background:linear-gradient(135deg,#2C2C2C,#111);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#D2B48C;margin:0 auto 14px;box-shadow:0 8px 16px rgba(44,44,44,0.2)}
.auth-brand h1{font-size:24px;font-weight:900;color:#1A1A1A}
.auth-brand p{color:#7A746B;font-size:14px;font-weight:500;margin-top:4px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:14px;font-weight:700;color:#1A1A1A;margin-bottom:8px}
.input-wrap{position:relative}
.input-icon{position:absolute;top:50%;transform:translateY(-50%);right:14px;color:#BDB7AF;font-size:16px;pointer-events:none}
.form-input{width:100%;background:#ffffff;border:1px solid #E8E3DB;border-radius:12px;padding:14px 44px 14px 14px;color:#1A1A1A;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:500;transition:.2s;box-shadow:inset 0 2px 4px rgba(0,0,0,0.01)}
.form-input:focus{outline:none;border-color:#8B5A2B;box-shadow:0 0 0 3px rgba(139,90,43,0.15)}
.form-input::placeholder{color:#BDB7AF;font-weight:400}
.btn-submit{width:100%;background:linear-gradient(135deg,#8B5A2B,#633E1A);color:#fff;border:none;padding:15px;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;box-shadow:0 8px 20px rgba(139,90,43,0.3);transition:.2s}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(139,90,43,0.4)}
.auth-footer{text-align:center;margin-top:24px;font-size:14px;font-weight:500;color:#7A746B}
.auth-footer a{color:#8B5A2B;font-weight:700;text-decoration:none}
.flash-msg{padding:14px 18px;border-radius:12px;font-size:14px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:10px;border-right:4px solid}
.flash-error{background:#fff;border-color:#8B0000;color:#8B0000;box-shadow:0 4px 12px rgba(139,0,0,0.1)}
.flash-success{background:#fff;border-color:#6B8E23;color:#6B8E23;box-shadow:0 4px 12px rgba(107,142,35,0.1)}
.back-home{position:fixed;top:20px;right:20px;color:#7A746B;text-decoration:none;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;padding:10px 16px;border-radius:10px;background:#ffffff;border:1px solid #E8E3DB;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,0.02)}
.back-home:hover{color:#8B5A2B;border-color:#8B5A2B;transform:translateY(-2px)}
</style>
</head>
<body>
<a href="/" class="back-home"><i class="fas fa-arrow-right"></i> الرئيسية</a>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-logo"><i class="fas fa-satellite"></i></div>
    <h1>NajatWatch</h1>
    <p>سجّل دخولك لإدارة ساعتك الذكية</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="flash-msg flash-{{ cat }}"><i class="fas fa-circle-exclamation"></i> {{ msg }}</div>
  {% endfor %}
  {% endwith %}
  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <div class="input-wrap">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" name="email" class="form-input" placeholder="example@email.com" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <div class="input-wrap">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn-submit"><i class="fas fa-right-to-bracket"></i> تسجيل الدخول</button>
  </form>
  <div class="auth-footer">ليس لديك حساب؟ <a href="{{ url_for('register') }}">إنشاء حساب جديد</a></div>
</div>
</body>
</html>
